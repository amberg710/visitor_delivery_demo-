<!DOCTYPE html>
<html>
<head><title>Add Visitor</title></head>
<body>
<h1>Add Visitor</h1>
<form method="POST">
<label>Name:</label><input type="text" name="name" required><br><br>
<label>Host:</label><input type="text" name="host" required><br><br>
<label>Email:</label><input type="email" name="email" required><br><br>
<label>Expected:</label><input type="datetime-local" name="expected"><br><br>
<label>Type:</label><input type="text" name="type"><br><br>
<button type="submit">Add Visitor</button>
</form>
</body>
</html>
