<!DOCTYPE html>
<html>
<head>
    <title>Visitor Check-In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        function toggleOtherPurpose() {
            const purpose = document.getElementById("purpose").value;
            const otherField = document.getElementById("other_purpose_wrapper");
            if (otherField) {
                otherField.style.display = purpose === "Other" ? "block" : "none";
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            toggleOtherPurpose();
        });
    </script>
</head>
<body>

<div class="glass-nav">
    <div class="nav-inner">
        <div class="nav-brand">Visitor & Delivery Hub</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/checkin">Check-In</a>
            <a href="/visitors">Visitors</a>
            <a href="/deliveries">Deliveries</a>
            <a href="/badges">Badges</a>
            <a href="/analytics">Analytics</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="page-hero">
        <div>
            <h1>Visitor Check-In</h1>
            <div class="page-subtitle">Register walk-ins and scheduled arrivals.</div>
        </div>
    </div>

    <div class="card">
        <h2>Register Visitor</h2>

        {% if available_badges %}
        <form action="/log_visitor" method="POST" class="form-grid">
            <input
                type="text"
                name="name"
                placeholder="Visitor Name"
                required
                value="{{ prefill.name if prefill else '' }}"
            >

            <input
                type="text"
                name="id_number"
                placeholder="ID Number"
                value="{{ prefill.id_number if prefill else '' }}"
            >

            <select name="purpose" id="purpose" required onchange="toggleOtherPurpose()">
                <option value="">Select Purpose</option>
                <option value="Interview" {% if prefill and prefill.purpose == "Interview" %}selected{% endif %}>Interview</option>
                <option value="Meeting" {% if prefill and prefill.purpose == "Meeting" %}selected{% endif %}>Meeting</option>
                <option value="Other" {% if prefill and prefill.purpose not in ["Interview", "Meeting", ""] %}selected{% endif %}>Other</option>
            </select>

            <div id="other_purpose_wrapper" style="display:none;">
                <input
                    type="text"
                    name="other_purpose"
                    id="other_purpose"
                    placeholder="Enter purpose"
                    value="{% if prefill and prefill.purpose not in ['Interview', 'Meeting', ''] %}{{ prefill.purpose }}{% endif %}"
                >
            </div>

            <input
                type="text"
                name="host"
                placeholder="Host / Receptionist"
                required
                value="{{ prefill.host if prefill else '' }}"
            >

            <select name="badge_number" required>
                <option value="">Select Available Badge</option>
                {% for badge in available_badges %}
                    <option value="{{ badge }}">Badge {{ badge }}</option>
                {% endfor %}
            </select>

            <button type="submit">Check In Visitor</button>
        </form>
        {% else %}
            <p><strong>No badges currently available.</strong></p>
        {% endif %}
    </div>
</div>

</body>
</html>
