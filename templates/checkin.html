<!DOCTYPE html>
<html>
<head>
<title>Visitor Checkin</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Visitors</h1>

<table>

<tr>
<th>Name</th>
<th>Host</th>
<th>Badge</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for v in visitors %}

<tr>

<td>{{v["Name"]}}</td>
<td>{{v["Host"]}}</td>
<td>{{v["Badge"]}}</td>
<td>{{v["Status"]}}</td>

<td>

{% if v["Status"]!="Checked-in" %}

<form method="POST" action="/assign_badge">

<input type="hidden" name="row" value="{{loop.index0}}">

<select name="badge">

{% for b in badges %}

<option value="{{b["Badge"]}}">{{b["Badge"]}}</option>

{% endfor %}

</select>

<button>Check-In</button>

</form>

{% else %}

<form method="POST" action="/checkout">

<input type="hidden" name="row" value="{{loop.index0}}">

<button>Check-Out</button>

</form>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

<a href="/">Back</a>

</div>

</body>
</html>
