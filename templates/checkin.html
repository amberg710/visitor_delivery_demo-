<!DOCTYPE html>
<html>
<head>
    <title>Visitor Check-in</title>
</head>
<body>
<h1>Visitor Check-in</h1>
<ul>
{% for i, v in enumerate(today_visitors) %}
<li>
  {{ v["Name"] }} | Status: {{ v["Status"] }}
  {% if v["Status"] != "Checked-in" %}
  <form action="/assign_badge" method="POST" style="display:inline;">
    <input type="hidden" name="row_index" value="{{ i }}">
    <select name="badge" required>
      {% for b in badges if b["Status"] == "Available" %}
        <option value="{{ b["BadgeNumber"] }}">{{ b["BadgeNumber"] }}</option>
      {% endfor %}
    </select>
    <button>Assign Badge & Check-in</button>
  </form>
  {% else %}
  <form action="/checkout" method="POST" style="display:inline;">
    <input type="hidden" name="row_index" value="{{ i }}">
    <button>Check-out</button>
  </form>
  {% endif %}
</li>
{% endfor %}
</ul>
<a href="/">Back to Home</a>
</body>
</html>
