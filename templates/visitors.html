<!DOCTYPE html>
<html>
<head>
    <title>Visitors</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Visitors</h1>

    <h2>Check-In</h2>
    <form action="/checkin" method="POST">
        <input name="name" placeholder="Visitor Name" required>
        <input name="host" placeholder="Host Name" required>
        <input name="badge" placeholder="Badge Number" required>
        <button>Check In</button>
    </form>

    <h2>Current Visitors</h2>
    <ul>
        {% for i,v in enumerate(visitors) %}
        <li>
            {{v["Name"]}} | Host: {{v["Host"]}} | Badge: {{v["Badge"]}} | Status: {{v["Status"]}} 
            <form action="/checkout" method="POST" style="display:inline;">
                <input type="hidden" name="row_index" value="{{i}}">
                <button>Check Out</button>
            </form>
        </li>
        {% endfor %}
    </ul>

    <a href="/">Back to Home</a>
</div>
</body>
</html>
